<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BodegaOps — Gestión multi-bodega</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
        /* ===== ESTILOS GLOBALES ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #fafaf9;
            --text-primary: #1c1c1c; --text-secondary: #6b7280; --border: #e5e7eb;
            --radius-md: 8px; --radius-lg: 12px; --amber: #BA7517; --amber-light: #FAEEDA;
            --amber-mid: #EF9F27; --amber-dark: #633806;
        }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--bg-tertiary); color: var(--text-primary); }
        #root { height: 100%; }
        input, select { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-primary); outline: none; }
        input:focus, select:focus { border-color: var(--amber-mid); box-shadow: 0 0 0 3px var(--amber-light); }
        button { font-family: inherit; cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Componentes comunes -->
    <script src="components/UIComponents.js"></script>
    <script src="components/DashboardView.js"></script>
    <script src="components/BodegasView.js"></script>
    <script src="components/InventarioView.js"></script>
    <script src="components/OtrosViews.js"></script>
    <script src="components/AsignacionView.js"></script>
    <script src="components/DevolucionView.js"></script>
    <script src="components/OTDashboardView.js"></script>
    <script src="components/ReasignacionOTView.js"></script>
    <script src="components/CargaMasivaView.js"></script>
    <script src="components/FormularioActaQA.js"></script>
    <script src="components/TecnicoView.js"></script>
    <script src="components/ControlCalidadView.js"></script>

    <script>
        // ========== CONFIGURACIÓN GLOBAL ==========
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';

        const http = {
            get: async (url, token) => {
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const r = await fetch(API_BASE + url, { headers });
                if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.statusText);
                return r.json();
            },
            post: async (url, data, token) => {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `Bearer ${token}`;
                const r = await fetch(API_BASE + url, { method: 'POST', headers, body: JSON.stringify(data) });
                if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.statusText);
                return r.json();
            },
            put: async (url, data, token) => {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `Bearer ${token}`;
                const r = await fetch(API_BASE + url, { method: 'PUT', headers, body: JSON.stringify(data) });
                if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.statusText);
                return r.json();
            }
        };

        // ========== COMPONENTE LOGIN ==========
        function LoginView({ onLogin }) {
            const [cedula, setCedula] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch(API_BASE + '/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cedula, password })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Credenciales inválidas');
                    onLogin(data.token, data.user);
                } catch (err) {
                    alert(err.message);
                    setPassword('');
                } finally {
                    setLoading(false);
                }
            };

            return React.createElement('div', { style: { display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', background: 'var(--bg-tertiary)' } },
                React.createElement('div', { style: { background: 'white', padding: '2rem', borderRadius: 12, boxShadow: '0 4px 12px rgba(0,0,0,0.1)', width: 320 } },
                    React.createElement('h2', { style: { marginBottom: '1.5rem', textAlign: 'center' } }, 'Iniciar sesión'),
                    React.createElement('form', { onSubmit: handleSubmit },
                        React.createElement('div', { style: { marginBottom: '1rem' } },
                            React.createElement('label', { style: { fontSize: 12, fontWeight: 500, display: 'block', marginBottom: 4 } }, 'Cédula'),
                            React.createElement('input', { type: 'text', value: cedula, onChange: e => setCedula(e.target.value), required: true })
                        ),
                        React.createElement('div', { style: { marginBottom: '1rem' } },
                            React.createElement('label', { style: { fontSize: 12, fontWeight: 500, display: 'block', marginBottom: 4 } }, 'Contraseña'),
                            React.createElement('input', { type: 'password', value: password, onChange: e => setPassword(e.target.value), required: true })
                        ),
                        React.createElement('button', {
                            type: 'submit',
                            disabled: loading,
                            style: { width: '100%', padding: '8px', background: 'var(--amber)', border: 'none', borderRadius: 6, color: 'white', fontWeight: 500, cursor: 'pointer' }
                        }, loading ? 'Ingresando...' : 'Ingresar')
                    )
                )
            );
        }

        // ========== SIDEBAR ==========
        function Sidebar({ view, setView, menuItems, onLogout, user }) {
            return React.createElement('aside', { style: { width: 260, flexShrink: 0, background: 'var(--bg-secondary)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', height: '100vh', position: 'sticky', top: 0 } },
                React.createElement('div', { style: { padding: '1.25rem 1rem', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 } },
                    React.createElement('div', { style: { width: 32, height: 32, borderRadius: 8, background: 'var(--amber-light)', display: 'flex', alignItems: 'center', justifyContent: 'center' } },
                        React.createElement('i', { className: 'ti ti-home', style: { fontSize: 18, color: 'var(--amber)' } })
                    ),
                    React.createElement('div', null,
                        React.createElement('p', { style: { margin: 0, fontWeight: 500, fontSize: 14 } }, 'BodegaOps'),
                        React.createElement('p', { style: { margin: 0, fontSize: 11, color: 'var(--text-secondary)' } }, user?.nombre || 'Usuario')
                    )
                ),
                React.createElement('nav', { style: { padding: '0.75rem', flex: 1 } },
                    menuItems.map(item => React.createElement('button', {
                        key: item.id,
                        onClick: () => setView(item.id),
                        style: {
                            width: '100%', textAlign: 'left', padding: '8px 10px', borderRadius: 8, border: 'none', cursor: 'pointer',
                            display: 'flex', alignItems: 'center', gap: 8,
                            background: view === item.id ? 'var(--amber-light)' : 'transparent',
                            color: view === item.id ? 'var(--amber)' : 'var(--text-secondary)',
                            fontWeight: view === item.id ? 500 : 400, fontSize: 13, marginBottom: 2
                        }
                    },
                        React.createElement('i', { className: `ti ${item.icon}`, style: { fontSize: 17 } }),
                        item.label
                    ))
                ),
                React.createElement('div', { style: { padding: '0.75rem 1rem', borderTop: '1px solid var(--border)', fontSize: 11, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
                    React.createElement('span', null, 'Conectado'),
                    React.createElement('button', { onClick: onLogout, style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--amber)' } }, 'Cerrar sesión')
                )
            );
        }

        // ========== COMPONENTE PRINCIPAL ==========
        function App() {
            const [user, setUser] = React.useState(null);
            const [token, setToken] = React.useState(localStorage.getItem('token'));
            const [view, setView] = React.useState('dashboard');
            const [bodegas, setBodegas] = React.useState([]);
            const [inv, setInv] = React.useState([]);
            const [mov, setMov] = React.useState([]);
            const [ots, setOts] = React.useState([]);
            const [tecnicos, setTecnicos] = React.useState([]);
            const [materiales, setMateriales] = React.useState([]);
            const [transferItem, setTransferItem] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [connErr, setConnErr] = React.useState(false);

            const login = (newToken, userData) => {
                localStorage.setItem('token', newToken);
                setToken(newToken);
                setUser(userData);
            };

            const logout = () => {
                localStorage.removeItem('token');
                setToken(null);
                setUser(null);
                setView('dashboard');
            };

            // Función para normalizar el tipo de usuario
            const normalizarTipo = (tipo) => {
                if (!tipo) return '';
                return tipo.trim().toUpperCase().replace(/\s+/g, '_');
            };

            const loadAdminData = async () => {
                try {
                    setLoading(true);
                    setConnErr(false);
                    const [bData, iData, mData, oData, movData, tecData] = await Promise.all([
                        http.get('/bodegas', token),
                        http.get('/inventario', token),
                        http.get('/materiales', token),
                        http.get('/ot', token),
                        http.get('/movimientos', token),
                        http.get('/inventario/tecnicos', token)
                    ]);
                    setBodegas(bData);
                    setInv(iData);
                    setMateriales(mData);
                    setOts(oData);
                    setMov(movData);
                    setTecnicos(tecData);
                } catch (err) {
                    console.error(err);
                    setConnErr(true);
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                if (token) {
                    fetch(API_BASE + '/auth/verify', { headers: { 'Authorization': `Bearer ${token}` } })
                        .then(r => r.json())
                        .then(data => {
                            if (data.valid) {
                                setUser(data.user);
                            } else {
                                logout();
                            }
                        })
                        .catch(() => logout());
                } else {
                    setLoading(false);
                }
            }, [token]);

            React.useEffect(() => {
                if (user) {
                    const tipo = normalizarTipo(user.tipo || user.tipo_usuario || '');
                    if (tipo !== 'TECNICO' && tipo !== 'CONTROL_CALIDAD') {
                        loadAdminData();
                    } else {
                        setLoading(false);
                    }
                }
            }, [user]);

            if (!user) {
                if (loading) return React.createElement('div', { style: { textAlign: 'center', padding: '2rem' } }, 'Verificando sesión...');
                return React.createElement(LoginView, { onLogin: login });
            }

            const tipoNorm = normalizarTipo(user.tipo || user.tipo_usuario || '');
            const isAdmin = tipoNorm === 'ADMIN' || tipoNorm === 'BODEGUERO' || tipoNorm === 'BODEGA';
            const isCalidad = tipoNorm === 'CONTROL_CALIDAD';
            const isPreconfigurador = tipoNorm === 'PRECONFIGURADOR';

            if (loading) return React.createElement('div', { style: { textAlign: 'center', padding: '2rem' } }, 'Cargando...');
            if (connErr) return React.createElement(ErrorConexion, { onRetry: loadAdminData });

            const menuItemsAdmin = [
                { id: 'dashboard', icon: 'ti-dashboard', label: 'Dashboard' },
                { id: 'inventario', icon: 'ti-package', label: 'Inventario' },
                { id: 'ot-dashboard', icon: 'ti-file-invoice', label: 'Dashboard OT' },
                { id: 'asignacion', icon: 'ti-truck-delivery', label: 'Entrega a Técnico' },
                { id: 'devolucion', icon: 'ti-rotate-clockwise-2', label: 'Devolución' },
                { id: 'reasignacion-ot', icon: 'ti-switch-horizontal', label: 'Reasignar OT' },
                { id: 'movimientos', icon: 'ti-history', label: 'Movimientos' },
                { id: 'bodegas', icon: 'ti-building-warehouse', label: 'Bodegas' },
                { id: 'ot', icon: 'ti-file-invoice', label: 'Órdenes de Trabajo' },
                { id: 'carga-masiva', icon: 'ti-upload', label: 'Carga Masiva' }
            ];
            const menuItemsTecnico = [{ id: 'mis-equipos', icon: 'ti-package', label: 'Mis Equipos' }];
            const menuItemsCalidad = [{ id: 'control-calidad', icon: 'ti-clipboard', label: 'Control Calidad' }];
            const menuItemsPreconfig = [{ id: 'ot-dashboard', icon: 'ti-file-invoice', label: 'Dashboard OT' }];

            if (isPreconfigurador) {
                return React.createElement('div', { style: { display: 'flex', minHeight: '100vh' } },
                    React.createElement(Sidebar, { view, setView, menuItems: menuItemsPreconfig, onLogout: logout, user }),
                    React.createElement('main', { style: { flex: 1, padding: '1.5rem' } },
                        view === 'ot-dashboard' && React.createElement(OTDashboardView, { ots, inv, refresh: loadAdminData, simplificado: true })
                    )
                );
            } else if (isCalidad) {
                return React.createElement('div', { style: { display: 'flex', minHeight: '100vh' } },
                    React.createElement(Sidebar, { view, setView, menuItems: menuItemsCalidad, onLogout: logout, user }),
                    React.createElement('main', { style: { flex: 1, padding: '1.5rem' } },
                        view === 'control-calidad' && React.createElement(ControlCalidadView, { user, token })
                    )
                );
            } else if (isAdmin) {
                return React.createElement('div', { style: { display: 'flex', minHeight: '100vh' } },
                    React.createElement(Sidebar, { view, setView, menuItems: menuItemsAdmin, onLogout: logout, user }),
                    React.createElement('main', { style: { flex: 1, padding: '1.5rem', minWidth: 0, overflowX: 'auto' } },
                        view === 'dashboard' && React.createElement(Dashboard, { bodegas, inv, mov }),
                        view === 'bodegas' && React.createElement(BodegasView, { bodegas, inv, refresh: loadAdminData }),
                        view === 'inventario' && React.createElement(InventarioView, { bodegas, inv, materiales, ots, setView, setTransferItem, refresh: loadAdminData }),
                        view === 'transferir' && React.createElement(TransferirView, { bodegas, inv, movimientos: mov, transferItem, setTransferItem, refresh: loadAdminData }),
                        view === 'movimientos' && React.createElement(MovimientosView, { movimientos: mov }),
                        view === 'asignacion' && React.createElement(AsignacionView, { bodegas, inv, ots, tecnicos, refresh: loadAdminData }),
                        view === 'devolucion' && React.createElement(DevolucionView, { bodegas, inv, ots, tecnicos, refresh: loadAdminData }),
                        view === 'ot-dashboard' && React.createElement(OTDashboardView, { ots, inv, refresh: loadAdminData }),
                        view === 'reasignacion-ot' && React.createElement(ReasignacionOTView, { inv, ots, refresh: loadAdminData }),
                        view === 'carga-masiva' && React.createElement(CargaMasivaView, { bodegas, materiales, refresh: loadAdminData })
                    )
                );
            } else {
                return React.createElement('div', { style: { display: 'flex', minHeight: '100vh' } },
                    React.createElement(Sidebar, { view, setView, menuItems: menuItemsTecnico, onLogout: logout, user }),
                    React.createElement('main', { style: { flex: 1, padding: '1.5rem' } },
                        view === 'mis-equipos' && React.createElement(TecnicoView, { user, token })
                    )
                );
            }
        }

        // Componente de error de conexión
        function ErrorConexion({ onRetry }) {
            return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', gap: 16, textAlign: 'center' } },
                React.createElement('i', { className: 'ti ti-wifi-off', style: { fontSize: 48 } }),
                React.createElement('p', { style: { fontWeight: 500, fontSize: 16 } }, 'No se pudo conectar al servidor'),
                React.createElement('button', { onClick: onRetry, style: { padding: '8px 20px', borderRadius: 6, border: '1px solid var(--amber-mid)', background: 'var(--amber-light)', cursor: 'pointer' } }, 'Reintentar')
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>

</html>
